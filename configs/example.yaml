data:
  path: ../data/sample_regression.csv
  target: target
  validation_size: 0.25
  random_state: 42

optimization:
  metric: rmse
  n_trials: 5
  plateau_trials: 4
  min_delta: 0.001
  study_name: sample-linear-regression
  random_state: 42
  repeated_splits: true

advisor:
  enabled: true
  provider: mock
  trigger: each_trial

output:
  directory: ../runs/example

models:
  - linear_regression
