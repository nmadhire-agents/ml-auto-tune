data:
  path: ../data/sample_regression.csv
  target: target
  # Optional: explicitly choose feature columns. When omitted, all non-target columns are used.
  features:
    - age
    - sex
    - bmi
    - bp
    - s1
    - s2
    - s3
    - s4
    - s5
    - s6
    - bmi_band
  validation_size: 0.25
  random_state: 42

optimization:
  metric: rmse
  n_trials: 5
  plateau_trials: 4
  min_delta: 0.001
  study_name: sample-linear-regression
  random_state: 42
  repeated_splits: true

advisor:
  enabled: true
  provider: openai_compatible
  trigger: each_trial
  base_url: http://127.0.0.1:8000/v1
  # model is discovered from GET http://127.0.0.1:8000/v1/models when omitted.

output:
  directory: ../runs/example

models:
  - linear_regression
