# Generic regression tuning template.
# Copy this file and update paths, target/features, models, and output directory.
task: regression

data:
  path: /absolute/or/relative/path/to/your_regression_data.csv
  target: target_column_name
  # Optional. Omit this field to use all non-target columns.
  # features:
  #   - feature_1
  #   - feature_2
  validation_size: 0.25
  random_state: 42

optimization:
  metric: rmse # rmse, mae, or r2
  n_trials: 30
  plateau_trials: 5
  min_delta: 0.001
  study_name: my-regression-run
  random_state: 42
  repeated_splits: false

advisor:
  enabled: false
  provider: mock # mock or openai_compatible
  trigger: plateau # plateau, end, or each_trial
  # For remote openai_compatible usage, prefer env vars:
  # ML_AUTO_TUNE_LLM_API_KEY, ML_AUTO_TUNE_LLM_BASE_URL, ML_AUTO_TUNE_LLM_MODEL
  # For a local server, set base_url: http://127.0.0.1:8000/v1 and omit api_key/model.

research:
  enabled: false
  max_experiments: 10
  improvement_min_delta: 0.001
  llm_enabled: false
  # program_path: configs/research_program.md

output:
  directory: runs/my-regression-run

models:
  - linear_regression
  - ridge
  - elastic_net
  - random_forest
  - hist_gradient_boosting
